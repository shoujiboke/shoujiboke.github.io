<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星星少年守护站 | 守护叛逆厌学孩子</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "微软雅黑", sans-serif;
            /* 替换为家长接受的 温馨治愈风景背景（无二次元） */
            background: url("https://api.btstu.cn/sjbz/?lx=suiji") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* 半透明磨砂遮罩 更柔和的色调 */
        .mask {
            width: 100%;
            min-height: 100vh;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 15px;
            letter-spacing: 4px;
            text-shadow: 0 2px 10px #000;
        }

        .sub {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.95;
            letter-spacing: 2px;
        }

        .desc {
            max-width: 650px;
            line-height: 2;
            font-size: 16px;
            margin-bottom: 50px;
            opacity: 0.9;
        }

        .btn {
            padding: 12px 36px;
            border: 1px solid #fff;
            border-radius: 50px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            text-decoration: none;
            transition: all 0.3s;
            font-size: 16px;
        }

        .btn:hover {
            background: rgba(255,255,255,0.4);
        }

        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="mask">
        <h1>星星少年守护站</h1>
        <div class="sub">理解青春期孩子 · 拒绝暴力管教 · 用爱守护成长</div>

        <div class="desc">
            孩子厌学、内向、沉迷网络，不是叛逆，是渴望被理解<br>
            拒绝暴力特训营，拒绝伤害式教育<br>
            我们为家长提供科学育儿指引，守护每一个敏感的少年<br>
            用沟通代替指责，用陪伴代替管控，让孩子安全长大
        </div>

        <a href="https://www.xinli6.com/" class="btn">科学育儿指南</a>

        <div class="footer">
            守护孩子 · 拒绝暴力 · 科学家庭教育
        </div>
    </div>
</body>
</html>
