<!DOCTYPE html>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "微软雅黑", sans-serif;
            /* 接入随机二次元大图 全屏背景 */
            background: url("https://www.loliapi.com/acg") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* 半透明磨砂遮罩 模仿原版样式 */
        .mask {
            width: 100%;
            min-height: 100vh;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 15px;
            letter-spacing: 6px;
            text-shadow: 0 2px 10px #000;
        }

        .sub {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.9;
            letter-spacing: 2px;
        }

        .desc {
            max-width: 600px;
            line-height: 2;
            font-size: 16px;
            margin-bottom: 50px;
            opacity: 0.85;
        }

        .btn {
            padding: 12px 36px;
            border: 1px solid #fff;
            border-radius: 50px;
            background: rgba(255,255,255,0.15);
            color: #fff;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="mask">
        <h1>星星少年的小屋</h1>
