<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>跨境电商实战指南</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;line-height:1.7;max-width:900px;margin:0 auto;padding:2rem 1rem}
.dark{background:#121212;color:#e0e0e0}
.light{background:#f6f8fa;color:#333}

header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
h1{font-size:2rem}
.subtitle{color:#888}

#toggle{padding:6px 12px;border-radius:8px;border:none;cursor:pointer}
.dark #toggle{background:#1e1e30;color:#fff}
.light #toggle{background:#e0e0e0;color:#333}

.search-row{display:flex;gap:10px;margin:1rem 0}
.search-input{flex:1;padding:10px 14px;border-radius:10px;border:none}
.dark .search-input{background:#1e1e30;color:#fff}
.light .search-input{background:#fff;color:#333}
.search-btn{padding:10px 16px;border-radius:10px;border:none;white-space:nowrap}
.dark .search-btn{background:#1e1e30;color:#fff}
.light .search-btn{background:#e0e0e0;color:#333}

.tag-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem}
.tag{padding:4px 10px;border-radius:99px;font-size:.8rem;border:none;cursor:pointer}
.dark .tag{background:#1e1e30;color:#fff}
.light .tag{background:#eef2f5;color:#333}
.tag.active{background:#007acc;color:white}

.card{border-radius:12px;padding:1.4rem;margin-bottom:1rem;cursor:pointer}
.dark .card{background:#1e1e30}
.light .card{background:#fff}
.card time{font-size:.8rem;color:#888}
.card h2{margin:.5rem 0;font-size:1.2rem}
.card-tags{display:flex;gap:6px;margin:.5rem 0}
.card-tag{font-size:.75rem;padding:2px 8px;border-radius:99px;background:#333;color:#ccc}
.light .card-tag{background:#eef2f5;color:#555}

#article-view{display:none;padding:2rem 1rem;min-height:100vh}
#article-view h2{margin-bottom:1rem}
#article-view .meta{color:#888;margin-bottom:1rem}
#article-view .content{line-height:1.8}
#back{margin-bottom:1rem;padding:6px 12px;border-radius:8px;border:none;cursor:pointer}
.dark #back{background:#1e1e30;color:#fff}
.light #back{background:#e0e0e0;color:#333}

img{max-width:100%;border-radius:8px;margin:1rem 0}
video{max-width:100%;border-radius:8px;margin:1rem 0}

footer{margin-top:3rem;text-align:center;color:#777;font-size:.9rem}
</style>
</head>

<body class="dark">
<div id="home">
<header>
  <div>
    <h1>跨境电商实战指南</h1>
    <div class="subtitle">厂家注册 | 选品 | 运营 | 物流</div>
  </div>
  <button id="toggle">白天模式</button>
</header>

<div class="search-row">
  <input class="search-input" id="search" placeholder="搜索商品、经验、注册、物流">
  <button class="search-btn" id="searchBtn">搜索</button>
</div>

<div class="tag-bar" id="tag-bar">
  <button class="tag active" data-tag="all">全部</button>
</div>

<div id="list"></div>
</div>

<div id="article-view">
  <button id="back">← 返回首页</button>
  <h2 id="art-title"></h2>
  <div class="meta" id="art-meta"></div>
  <div class="content" id="art-content"></div>
</div>

<footer>© 2026 跨境电商实战指南</footer>

<script>
const posts = [
{
  id:1,
  title:"2026最适合跨境的5类商品（爆款推荐）",
  date:"2026-03-30",
  tags:["商品","选品","爆款","2026"],
  content:`
<p><strong>1. 便携小家电</strong>：欧美市场需求极高，利润稳定</p>
<p><strong>2. 智能家居小件</strong>：插座、灯、传感器，复购高</p>
<p><strong>3. 户外休闲产品</strong>：露营、骑行、运动配件</p>
<p><strong>4. 美妆工具</strong>：化妆镜、洗脸仪、美甲套装</p>
<p><strong>5. 宠物用品</strong>：欧美宠物市场大，竞争小</p>
<img src="https://picsum.photos/800/400">
`
},
{
  id:2,
  title:"厂家跨境电商注册全流程（公司+个体都能做）",
  date:"2026-03-29",
  tags:["注册","厂家","开店","教程"],
  content:`
<h3>一、公司入驻材料</h3>
<p>营业执照 → 法人身份证 → 银行账户 → 品牌授权</p>

<h3>二、个体入驻材料</h3>
<p>身份证 → 手机号 → 银行卡 → 店铺承诺书</p>

<h3>三、平台选择建议</h3>
<p>新手：Temu、SHEIN、TikTok Shop<br>
老手：亚马逊、独立站</p>
`
},
{
  id:3,
  title:"厂家做跨境必须知道的5条经验",
  date:"2025-10-05",
  tags:["经验","厂家","运营","避坑"],
  content:`
<p>1. 不要盲目铺货，先测款再批量</p>
<p>2. 物流优先选官方仓，时效稳</p>
<p>3. 图片和文案必须本地化</p>
<p>4. 价格不要卷太低，保证利润</p>
<p>5. 关注政策变化，合规第一</p>
`
},
{
  id:4,
  title:"跨境物流怎么选？最便宜最快方案",
  date:"2025-09-20",
  tags:["物流","发货","运费","教程"],
  content:`
<p><strong>快递直发</strong>：快、贵，适合小件轻货</p>
<p><strong>海外仓</strong>：体验好，适合稳定爆款</p>
<p><strong>平台官方仓</strong>：最稳，新手首选</p>
<p><strong>海运</strong>：便宜，但慢，适合大货</p>
`
}
];

const POSTS_PER_PAGE = 30;

function render(list) {
  const showList = list.slice(0, POSTS_PER_PAGE);
  const listEl = document.getElementById('list');
  listEl.innerHTML = showList.map(p => `
    <div class="card" onclick="openArticle(${p.id})">
      <time>${p.date}</time>
      <h2>${p.title}</h2>
      <div class="card-tags">
        ${p.tags.map(t => `<span class="card-tag">#${t}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

function buildTags() {
  const bar = document.getElementById('tag-bar');
  const tags = new Set();
  posts.forEach(p => p.tags.forEach(t => tags.add(t)));
  Array.from(tags).forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tag';
    btn.dataset.tag = t;
    btn.textContent = t;
    bar.appendChild(btn);
  });
}

function bindTag() {
  document.querySelectorAll('.tag').forEach(t => {
    t.onclick = () => {
      document.querySelectorAll('.tag').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      const v = t.dataset.tag;
      const f = v == 'all' ? posts : posts.filter(p => p.tags.includes(v));
      render(f);
    }
  });
}

document.getElementById('searchBtn').onclick = () => {
  const kw = document.getElementById('search').value.toLowerCase().trim();
  if (!kw) {
    render(posts);
    return;
  }

  const f = posts.filter(p => {
    const title = p.title.toLowerCase();
    const tags = p.tags.join(',').toLowerCase();
    const content = p.content.toLowerCase();
    const date = p.date.toLowerCase();

    return title.includes(kw)
        || tags.includes(kw)
        || content.includes(kw)
        || date.includes(kw);
  });

  render(f);
};

function openArticle(id) {
  const p = posts.find(x => x.id == id);
  document.getElementById('art-title').innerText = p.title;
  document.getElementById('art-meta').innerText = p.date + ' · ' + p.tags.map(t=>'#'+t).join(' ');
  document.getElementById('art-content').innerHTML = p.content;
  document.getElementById('home').style.display = 'none';
  document.getElementById('article-view').style.display = 'block';
}

document.getElementById('back').onclick = () => {
  document.getElementById('article-view').style.display = 'none';
  document.getElementById('home').style.display = 'block';
};

const body = document.body;
const toggle = document.getElementById('toggle');
const mode = localStorage.getItem('mode') || 'dark';
body.className = mode;
toggle.textContent = mode == 'dark' ? '白天模式' : '黑夜模式';
toggle.onclick = () => {
  const m = body.classList.contains('dark') ? 'light' : 'dark';
  body.className = m;
  toggle.textContent = m == 'dark' ? '白天模式' : '黑夜模式';
  localStorage.setItem('mode', m);
};

buildTags();
render(posts);
bindTag();
</script>
</body>
</html>
